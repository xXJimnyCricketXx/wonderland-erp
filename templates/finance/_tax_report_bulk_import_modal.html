<div class="modal-header bg-brand text-white">
    <h5 class="modal-title">USt-Berichte importieren</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Schließen"></button>
</div>
<form hx-post="{% url 'finance:tax_report_bulk_import' %}" hx-target="#financeModalContent" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="modal-body">
        <p class="text-muted small">
            Mehrere Etsy-USt-Berichte auf einmal hochladen - Jahr und Monat werden automatisch aus dem
            Dateinamen erkannt (z.B. „tax_statement_2024-8.pdf" → August 2024). Dateien mit abweichendem
            Namen werden übersprungen.
        </p>
        <input type="file" name="files" class="form-control" multiple accept="application/pdf" required>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Abbrechen</button>
        <button type="submit" class="btn btn-primary">Importieren</button>
    </div>
</form>
