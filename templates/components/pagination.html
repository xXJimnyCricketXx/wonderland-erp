{% if is_paginated %}
<nav aria-label="Seitennavigation">
    <ul class="pagination justify-content-end">
        {% if page_obj.has_previous %}
            <li class="page-item">
                <a class="page-link" href="?{% for key, value in request.GET.items %}{% if key != 'page' %}{{ key }}={{ value }}&amp;{% endif %}{% endfor %}page={{ page_obj.previous_page_number }}">Zurück</a>
            </li>
        {% else %}
            <li class="page-item disabled"><span class="page-link">Zurück</span></li>
        {% endif %}

        {% for num in page_obj.paginator.page_range %}
            <li class="page-item {% if num == page_obj.number %}active{% endif %}">
                <a class="page-link" href="?{% for key, value in request.GET.items %}{% if key != 'page' %}{{ key }}={{ value }}&amp;{% endif %}{% endfor %}page={{ num }}">{{ num }}</a>
            </li>
        {% endfor %}

        {% if page_obj.has_next %}
            <li class="page-item">
                <a class="page-link" href="?{% for key, value in request.GET.items %}{% if key != 'page' %}{{ key }}={{ value }}&amp;{% endif %}{% endfor %}page={{ page_obj.next_page_number }}">Weiter</a>
            </li>
        {% else %}
            <li class="page-item disabled"><span class="page-link">Weiter</span></li>
        {% endif %}
    </ul>
</nav>
{% endif %}
