<div class="list-group list-group-flush">
    {% for c in contacts %}
        <a href="{% url 'messaging:conversation' c.user.pk %}"
           hx-get="{% url 'messaging:conversation' c.user.pk %}" hx-target="#conversation-panel" hx-swap="innerHTML" hx-push-url="true"
           class="list-group-item list-group-item-action{% if c.user.pk == active_user_id %} active{% endif %}">
            <div class="d-flex justify-content-between align-items-center">
                <strong>{{ c.user.username }}</strong>
                {% if c.unread %}
                    <span class="badge rounded-pill bg-danger">{{ c.unread }}</span>
                {% endif %}
            </div>
            {% if c.last_message %}
                <div class="small text-truncate{% if c.user.pk != active_user_id %} text-muted{% endif %}">
                    {{ c.last_message.body }}
                </div>
            {% endif %}
        </a>
    {% empty %}
        <div class="p-3 text-muted small">Keine anderen Nutzer vorhanden.</div>
    {% endfor %}
</div>
