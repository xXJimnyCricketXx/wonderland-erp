name: wonderland-erp

services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - db-data:/app/data
      - media-data:/app/media
      - static-data:/app/staticfiles
    expose:
      - "8000"

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media-data:/app/media:ro
      - static-data:/app/staticfiles:ro

volumes:
  db-data:
  media-data:
  static-data:

# On Unraid, replace the named volumes above with bind mounts to a share,
# e.g. "/mnt/user/appdata/wonderland-erp/data:/app/data", so backups are a
# plain file copy (see konzept doc section 5).
